# .github/workflows/beta.yml
name: Release Deploy

on:
  push:
    branches:
      - "release/**" # es. release/v1.2.3

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      REPOSITORY_NAME: traceflow-sdk
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.CI_CD_USER_ACCESS_KEY }}
          persist-credentials: true

      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('js/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Configure NPM for private packages
        run: echo "//registry.npmjs.org/:_authToken=${{ secrets.NO_TWOFA_NPM_TOKEN }}" > ~/.npmrc

      - name: Install & Build
        working-directory: js
        run: |
          npm install --force
          npm run build

      - name: Conditional version bump & changelog
        working-directory: js
        run: |
          git config --global user.email "ci@github.com"
          git config --global user.name "GitHub Actions Bot"

          if git log -1 --pretty=%B | grep -q "chore(release)"; then
            echo "Version bump commit found, skipping release to avoid loop."
          else
            # Extract version from branch name (e.g. release/2.6.0 → 2.6.0)
            BRANCH="${GITHUB_REF#refs/heads/}"
            VERSION=$(echo "${BRANCH}" | sed -E 's/release\///')

            echo "Running release step with version ${VERSION}..."
            npm run release -- --release-as "${VERSION}" --releaseCommitMessageFormat "chore(release): bump version to %s [skip ci]"

            git push --set-upstream origin HEAD || true
            git push --follow-tags
          fi

      - name: Publish to NPM
        working-directory: js
        run: npm publish

      - name: Merge release branch into develop
        run: |
          git config --global user.email "ci@github.com"
          git config --global user.name "GitHub Actions Bot"

          RELEASE_BRANCH="${GITHUB_REF#refs/heads/}"

          if ! git ls-remote --exit-code --heads origin develop > /dev/null 2>&1; then
            echo "Branch 'develop' does not exist. Skipping merge into develop."
            exit 0
          fi

          git fetch --unshallow || true
          git fetch origin develop "${RELEASE_BRANCH}"

          git checkout develop
          VERSION=$(echo "${RELEASE_BRANCH}" | sed -E 's/release\///')
          echo "Merging release branch ${RELEASE_BRANCH} into develop (version ${VERSION})"
          git merge --no-ff --no-edit -m "Finish ${VERSION}" -X theirs "origin/${RELEASE_BRANCH}" || \
            git merge --no-ff --no-edit -m "Finish ${VERSION}" -X theirs "origin/${RELEASE_BRANCH}" --allow-unrelated-histories

          git push origin develop

      - name: Merge release branch into master
        run: |
          git config --global user.email "ci@github.com"
          git config --global user.name "GitHub Actions Bot"

          RELEASE_BRANCH="${GITHUB_REF#refs/heads/}"

          if ! git ls-remote --exit-code --heads origin master > /dev/null 2>&1; then
            echo "Branch 'master' does not exist. Skipping merge into master."
            exit 0
          fi

          git fetch --unshallow || true
          git fetch origin master "${RELEASE_BRANCH}"

          git checkout master
          VERSION=$(echo "${RELEASE_BRANCH}" | sed -E 's/release\///')
          echo "Merging release branch ${RELEASE_BRANCH} into master (version ${VERSION})"
          git merge --no-ff --no-edit -m "Finish ${VERSION}" -X theirs "origin/${RELEASE_BRANCH}" || \
            git merge --no-ff --no-edit -m "Finish ${VERSION}" -X theirs "origin/${RELEASE_BRANCH}" --allow-unrelated-histories

          git push origin master

      - name: Delete release branch
        run: |
          RELEASE_BRANCH="${GITHUB_REF#refs/heads/}"
          echo "Deleting remote release branch: ${RELEASE_BRANCH}"
          git push origin --delete "${RELEASE_BRANCH}" || true
